<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐬 イルカのジャンプ！</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rounded+Mplus+1c:wght@400;700;800&display=swap');

  :root {
    --sky1: #c9f0ff;
    --sky2: #e8f9ff;
    --sea1: #5bc8f5;
    --sea2: #1a8fc1;
    --sea3: #0d5f8a;
    --pastel-pink: #ffb3d1;
    --pastel-yellow: #fff3b0;
    --pastel-green: #b8f0c8;
    --pastel-purple: #d4b8f0;
    --pastel-orange: #ffd4a8;
    --white: #ffffff;
    --text-dark: #3a5a7c;
    --heart-red: #ff6b8a;
    --gold: #ffd700;
    --shadow: rgba(90,160,210,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rounded Mplus 1c', 'Hiragino Maru Gothic ProN', 'BIZ UDPGothic', sans-serif;
    background: var(--sky1);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ===== SCREENS ===== */
  .screen {
    display: none;
    width: 480px;
    max-width: 100vw;
    position: relative;
  }
  .screen.active { display: block; }

  /* ===== TITLE SCREEN ===== */
  #titleScreen {
    background: linear-gradient(180deg, #c9f0ff 0%, #e8f9ff 40%, #a0dff7 100%);
    border-radius: 32px;
    box-shadow: 0 8px 40px var(--shadow);
    padding: 28px 24px 24px;
    text-align: center;
    min-height: 600px;
  }

  .title-logo {
    font-size: 2.6rem;
    font-weight: 800;
    color: var(--text-dark);
    text-shadow: 3px 3px 0 #fff, 0 0 20px #5bc8f566;
    letter-spacing: 2px;
    margin-bottom: 4px;
    animation: float 3s ease-in-out infinite;
  }
  .title-dolphin {
    font-size: 4rem;
    animation: float 2.5s ease-in-out infinite;
    display: inline-block;
  }
  .title-sub {
    font-size: 0.95rem;
    color: #6fa8d0;
    margin-bottom: 18px;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .section-label {
    font-size: 0.85rem;
    font-weight: 800;
    color: var(--text-dark);
    margin-bottom: 8px;
    margin-top: 14px;
    letter-spacing: 1px;
  }

  /* difficulty */
  .diff-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 4px;
  }
  .diff-btn {
    border: none;
    border-radius: 20px;
    padding: 10px 6px;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    box-shadow: 0 4px 0 #0002;
  }
  .diff-btn:active { transform: scale(0.95); }
  .diff-btn.selected { outline: 3px solid var(--text-dark); transform: scale(1.06); }
  .diff-btn[data-diff="easy"]   { background: var(--pastel-green);  color: #2d7a4a; }
  .diff-btn[data-diff="normal"] { background: var(--pastel-yellow); color: #7a6a00; }
  .diff-btn[data-diff="hard"]   { background: var(--pastel-orange); color: #8a4000; }
  .diff-btn[data-diff="crazy"]  { background: var(--pastel-pink);   color: #8a1a3a; }

  /* stage */
  .stage-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 4px;
  }
  .stage-btn {
    border: none;
    border-radius: 18px;
    padding: 10px 4px;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.12s;
    box-shadow: 0 4px 0 #0002;
  }
  .stage-btn.selected { outline: 3px solid var(--text-dark); transform: scale(1.08); }
  .stage-btn[data-stage="1"] { background: #a0eaff; color: #1a5f8a; }
  .stage-btn[data-stage="2"] { background: #7ad4ff; color: #0d3f6a; }
  .stage-btn[data-stage="3"] { background: #4ab8f0; color: #fff; }

  /* hearts */
  .heart-selector {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 4px;
  }
  .heart-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--pastel-pink);
    font-size: 1.2rem;
    cursor: pointer;
    font-weight: 800;
    color: #8a1a3a;
    box-shadow: 0 3px 0 #0002;
    transition: transform 0.1s;
  }
  .heart-btn:active { transform: scale(0.9); }
  .heart-count {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--heart-red);
    min-width: 60px;
    text-align: center;
  }

  /* start btn */
  .start-btn {
    margin-top: 18px;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 28px;
    background: linear-gradient(135deg, #5bc8f5, #1a8fc1);
    color: #fff;
    font-family: inherit;
    font-size: 1.4rem;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 6px 0 #0d5f8a, 0 8px 20px #0004;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 2px;
  }
  .start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #0d5f8a; }

  .ranking-link {
    margin-top: 12px;
    display: inline-block;
    color: #6fa8d0;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: underline dotted;
  }
  .ranking-link:hover { color: var(--text-dark); }

  /* ===== GAME SCREEN ===== */
  #gameScreen {
    position: relative;
    width: 480px;
    height: 600px;
    overflow: hidden;
    border-radius: 32px;
    box-shadow: 0 8px 40px var(--shadow);
    cursor: pointer;
  }

  #gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  /* HUD overlay */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 14px 18px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
  }
  .hud-score {
    font-size: 1.5rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 2px 2px 6px #1a8fc188;
  }
  .hud-combo {
    font-size: 1rem;
    font-weight: 800;
    color: var(--pastel-yellow);
    text-shadow: 1px 1px 4px #0006;
    min-height: 1.4rem;
  }
  .hud-hearts {
    font-size: 1.4rem;
    letter-spacing: 2px;
  }
  .hud-stage {
    position: absolute;
    top: 14px; left: 50%; transform: translateX(-50%);
    font-size: 0.8rem;
    font-weight: 800;
    color: #ffffffcc;
    text-shadow: 1px 1px 3px #0006;
  }

  /* pause btn */
  #pauseBtn {
    position: absolute;
    bottom: 14px; right: 14px;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    background: #ffffffaa;
    font-size: 1.1rem;
    cursor: pointer;
    pointer-events: all;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px #0003;
  }

  /* ===== RESULT SCREEN ===== */
  #resultScreen {
    background: linear-gradient(160deg, #e8f9ff 0%, #c9f0ff 100%);
    border-radius: 32px;
    box-shadow: 0 8px 40px var(--shadow);
    padding: 30px 24px;
    text-align: center;
    min-height: 500px;
  }
  .result-title {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text-dark);
    margin-bottom: 6px;
  }
  .result-score {
    font-size: 3.2rem;
    font-weight: 800;
    color: var(--sea2);
    text-shadow: 2px 2px 0 #fff;
    margin: 8px 0;
  }
  .result-combo {
    font-size: 1rem;
    color: #e07040;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .name-input-area { margin: 14px 0; }
  .name-input-area label {
    font-size: 0.9rem;
    font-weight: 800;
    color: var(--text-dark);
    display: block;
    margin-bottom: 6px;
  }
  .name-input-area input {
    width: 100%;
    padding: 10px 16px;
    border-radius: 20px;
    border: 2.5px solid #b0dff0;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-dark);
    background: #fff;
    outline: none;
    transition: border 0.15s;
  }
  .name-input-area input:focus { border-color: var(--sea1); }

  .result-btns {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .result-btn {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 22px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.1s;
    box-shadow: 0 4px 0 #0002;
  }
  .result-btn:active { transform: scale(0.96); }
  .btn-register { background: linear-gradient(135deg,#ffd4a8,#ffb3d1); color: #6a2040; }
  .btn-retry    { background: linear-gradient(135deg,#5bc8f5,#1a8fc1); color: #fff; }
  .btn-title    { background: linear-gradient(135deg,#d4b8f0,#b8a0e0); color: #3a1a6a; }

  /* ===== RANKING SCREEN ===== */
  #rankingScreen {
    background: linear-gradient(160deg, #fffbe8 0%, #e8f9ff 100%);
    border-radius: 32px;
    box-shadow: 0 8px 40px var(--shadow);
    padding: 28px 20px;
    min-height: 480px;
  }
  .ranking-title {
    text-align: center;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--text-dark);
    margin-bottom: 18px;
  }
  .ranking-list { list-style: none; }
  .ranking-item {
    display: flex;
    align-items: center;
    background: #fff;
    border-radius: 16px;
    margin-bottom: 10px;
    padding: 10px 16px;
    box-shadow: 0 2px 8px #b0dff044;
    gap: 12px;
  }
  .rank-num {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--sea2);
    min-width: 30px;
  }
  .rank-num.gold   { color: #d4a000; }
  .rank-num.silver { color: #909090; }
  .rank-num.bronze { color: #c07040; }
  .rank-name { flex: 1; font-weight: 700; color: var(--text-dark); font-size: 1rem; }
  .rank-score { font-size: 1.1rem; font-weight: 800; color: var(--sea2); }
  .rank-info  { font-size: 0.75rem; color: #90b0c8; margin-top: 1px; }
  .rank-meta  { text-align: right; }

  .btn-back {
    margin-top: 18px;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 22px;
    background: linear-gradient(135deg, #5bc8f5, #1a8fc1);
    color: #fff;
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 0 #0d5f8a44;
    transition: transform 0.1s;
  }
  .btn-back:active { transform: scale(0.97); }

  /* ===== PAUSE OVERLAY ===== */
  #pauseOverlay {
    display: none;
    position: absolute;
    inset: 0;
    background: #0009;
    border-radius: 32px;
    z-index: 20;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #pauseOverlay.show { display: flex; }
  .pause-title {
    font-size: 2.2rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 2px 2px 8px #0006;
  }
  .pause-btn {
    padding: 12px 36px;
    border: none;
    border-radius: 24px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 0 #0003;
  }

  /* floating bubbles bg */
  .bubbles-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    overflow: hidden;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    opacity: 0.18;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(110vh) scale(1); opacity:0.18; }
    100% { transform: translateY(-10vh) scale(1.2); opacity:0; }
  }
</style>
</head>
<body>

<!-- floating bubbles background -->
<div class="bubbles-bg" id="bubblesBg"></div>

<!-- ===== TITLE SCREEN ===== -->
<div class="screen active" id="titleScreen">
  <div class="title-dolphin" style="font-size:3rem;">🌊🐬🌊</div>
  <div class="title-logo">イルカのジャンプ！</div>
  <div class="title-sub">タップしてジャンプ！リングをくぐろう🌊</div>

  <div class="section-label">⚙️ むずかしさ</div>
  <div class="diff-grid">
    <button class="diff-btn selected" data-diff="easy">🌸 かんたん</button>
    <button class="diff-btn" data-diff="normal">🌊 ふつう</button>
    <button class="diff-btn" data-diff="hard">⚡ むずかしい</button>
    <button class="diff-btn" data-diff="crazy">🔥 げきむず</button>
  </div>

  <div class="section-label">🌊 ステージ</div>
  <div class="stage-grid">
    <button class="stage-btn selected" data-stage="1">🌤️<br>あさい海</button>
    <button class="stage-btn" data-stage="2">🌊<br>ふかい海</button>
    <button class="stage-btn" data-stage="3">⛈️<br>あらしの海</button>
  </div>

  <div class="section-label">💨 スピード</div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;padding:0 4px;">
    <span style="font-size:0.9rem;color:#6fa8d0;font-weight:700;">🐢 ゆっくり</span>
    <input type="range" id="speedSlider" min="1" max="5" step="1" value="3"
      style="flex:1;accent-color:#5bc8f5;height:6px;cursor:pointer;">
    <span style="font-size:0.9rem;color:#6fa8d0;font-weight:700;">はやい 🚀</span>
  </div>
  <div style="text-align:center;font-size:0.9rem;font-weight:800;color:#3a5a7c;margin-bottom:2px;" id="speedLabel">スピード: ふつう ⭐⭐⭐</div>

  <div class="section-label">❤️ ハートのかず</div>
  <div class="heart-selector">
    <button class="heart-btn" id="heartMinus">－</button>
    <div class="heart-count" id="heartCount">❤️×3</div>
    <button class="heart-btn" id="heartPlus">＋</button>
  </div>

  <button class="start-btn" id="startBtn">🐬 スタート！</button>
  <div class="ranking-link" id="rankingLink">🏆 ランキングをみる</div>
  <div style="margin-top:8px;">
    <button id="muteBtn" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:#6fa8d0;font-weight:700;" title="BGMのオン/オフ">🔊 BGM ON</button>
  </div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div class="screen" id="gameScreen">
  <canvas id="gameCanvas" width="480" height="600"></canvas>
  <div id="hud">
    <div>
      <div class="hud-score" id="hudScore">0</div>
      <div class="hud-combo" id="hudCombo"></div>
    </div>
    <div class="hud-stage" id="hudStage"></div>
    <div class="hud-hearts" id="hudHearts"></div>
  </div>
  <button id="pauseBtn">⏸</button>
  <div id="pauseOverlay">
    <div class="pause-title">⏸ ポーズ</div>
    <button class="pause-btn" id="resumeBtn" style="background:#5bc8f5;color:#fff;">▶ つづける</button>
    <button class="pause-btn" id="pauseTitleBtn" style="background:#ffb3d1;color:#6a2040;">🏠 タイトルへ</button>
  </div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div class="screen" id="resultScreen">
  <div class="result-title" id="resultTitle">ゲームオーバー！</div>
  <div style="font-size:3rem;" id="resultEmoji">😢</div>
  <div class="result-score" id="resultScore">0 pt</div>
  <div class="result-combo" id="resultCombo"></div>
  <div class="name-input-area">
    <label>📝 なまえをいれてね！</label>
    <input type="text" id="nameInput" maxlength="10" placeholder="なまえ（さいだい10もじ）">
  </div>
  <div class="result-btns">
    <button class="result-btn btn-register" id="registerBtn">🏆 とうろく</button>
    <button class="result-btn btn-retry" id="retryBtn">🔄 もういちど</button>
    <button class="result-btn btn-title" id="titleBtn">🏠 タイトル</button>
  </div>
</div>

<!-- ===== RANKING SCREEN ===== -->
<div class="screen" id="rankingScreen">
  <div class="ranking-title">🏆 ランキング</div>
  <ul class="ranking-list" id="rankingList"></ul>
  <button class="btn-back" id="backBtn">← もどる</button>
</div>

<script>
// ===== BUBBLES BG =====
(function(){
  const bg = document.getElementById('bubblesBg');
  const colors = ['#5bc8f5','#ffb3d1','#d4b8f0','#b8f0c8','#fff3b0'];
  for(let i=0;i<18;i++){
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 20+Math.random()*60;
    b.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      bottom:-100px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${6+Math.random()*10}s;
      animation-delay:${Math.random()*10}s;
    `;
    bg.appendChild(b);
  }
})();

// ===== STATE =====
let selectedDiff = 'easy';
let selectedStage = 1;
let heartCount = 3;
let currentScore = 0;
let bestCombo = 0;
let gameState = 'idle'; // idle | playing | paused | over
let savedName = '';

// ===== DIFFICULTY CONFIG =====
const DIFF = {
  // 難易度は障害物の数量のみで決まる。スピードは別途スライダーで設定
  // obstacleFreq: 毎フレームの出現確率（高いほど頻繁に出る）
  easy:   { obstacleFreq: 0.010, itemFreq: 0.012, minRingH: 85 },  // 約100fに1回
  normal: { obstacleFreq: 0.020, itemFreq: 0.009, minRingH: 72 },  // 約50fに1回
  hard:   { obstacleFreq: 0.035, itemFreq: 0.007, minRingH: 58 },  // 約28fに1回
  crazy:  { obstacleFreq: 0.055, itemFreq: 0.005, minRingH: 44 },  // 約18fに1回
};

// スピード設定（スライダーで選択）
let selectedSpeed = 3; // 1〜5

// ===== STAGE CONFIG =====
const STAGE_CFG = {
  1: { name: '🌤️ あさい海', skyTop:'#c9f0ff', skyBot:'#a0dff7', seaTop:'#5bc8f5', seaBot:'#1a8fc1' },
  2: { name: '🌊 ふかい海', skyTop:'#7ab8e0', skyBot:'#5090c0', seaTop:'#2090c0', seaBot:'#0d5f8a' },
  3: { name: '⛈️ あらしの海', skyTop:'#7080a0', skyBot:'#506080', seaTop:'#1a5a80', seaBot:'#0a3050' },
};

// ===== TITLE SCREEN LOGIC =====
document.querySelectorAll('.diff-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedDiff = btn.dataset.diff;
  });
});
document.querySelectorAll('.stage-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.stage-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedStage = parseInt(btn.dataset.stage);
  });
});
document.getElementById('heartMinus').addEventListener('click',()=>{
  if(heartCount>1){ heartCount--; updateHeartDisplay(); }
});
document.getElementById('heartPlus').addEventListener('click',()=>{
  if(heartCount<9){ heartCount++; updateHeartDisplay(); }
});
function updateHeartDisplay(){
  document.getElementById('heartCount').textContent = '❤️×'+heartCount;
}

// スピードスライダー
const speedLabels = ['', 'とてもゆっくり ⭐', 'ゆっくり ⭐⭐', 'ふつう ⭐⭐⭐', 'はやい ⭐⭐⭐⭐', 'とてもはやい ⭐⭐⭐⭐⭐'];
document.getElementById('speedSlider').addEventListener('input', function(){
  selectedSpeed = parseInt(this.value);
  document.getElementById('speedLabel').textContent = 'スピード: ' + speedLabels[selectedSpeed];
});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('rankingLink').addEventListener('click', showRanking);
document.getElementById('backBtn').addEventListener('click', ()=>showScreen('titleScreen'));
document.getElementById('pauseBtn').addEventListener('click', togglePause);
document.getElementById('resumeBtn').addEventListener('click', togglePause);
document.getElementById('pauseTitleBtn').addEventListener('click', ()=>{
  gameState='over';
  showScreen('titleScreen');
});
document.getElementById('registerBtn').addEventListener('click', registerScore);
document.getElementById('retryBtn').addEventListener('click', ()=>{ showScreen('titleScreen'); });
document.getElementById('titleBtn').addEventListener('click', ()=>showScreen('titleScreen'));

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== RANKING =====
function getRanking(){
  try{ return JSON.parse(localStorage.getItem('dolphin_ranking')||'[]'); }
  catch(e){ return []; }
}
function saveRanking(arr){
  localStorage.setItem('dolphin_ranking', JSON.stringify(arr));
}
function registerScore(){
  const name = document.getElementById('nameInput').value.trim() || 'ななし';
  savedName = name;
  const cfg = STAGE_CFG[selectedStage];
  const entry = {
    name, score: currentScore, diff: selectedDiff,
    stage: cfg.name, combo: bestCombo,
    date: new Date().toLocaleDateString('ja-JP')
  };
  const ranking = getRanking();
  ranking.push(entry);
  ranking.sort((a,b)=>b.score-a.score);
  ranking.splice(10);
  saveRanking(ranking);
  document.getElementById('registerBtn').textContent = '✅ とうろく済み';
  document.getElementById('registerBtn').disabled = true;
  showRanking(true);
}
function showRanking(fromResult=false){
  const ranking = getRanking();
  const list = document.getElementById('rankingList');
  list.innerHTML = '';
  if(ranking.length===0){
    list.innerHTML = '<li style="text-align:center;color:#90b0c8;padding:20px;">まだきろくがないよ！</li>';
  }
  ranking.forEach((r,i)=>{
    const li = document.createElement('li');
    li.className = 'ranking-item';
    const medals = ['gold','silver','bronze'];
    const rankClass = medals[i]||'';
    const rankLabel = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    li.innerHTML = `
      <div class="rank-num ${rankClass}">${rankLabel}</div>
      <div>
        <div class="rank-name">${escHtml(r.name)}</div>
        <div class="rank-info">${r.diff} / ${r.stage}</div>
      </div>
      <div class="rank-meta">
        <div class="rank-score">${r.score} pt</div>
        <div class="rank-info">コンボ ${r.combo} / ${r.date}</div>
      </div>
    `;
    list.appendChild(li);
  });
  // ミュートボタン
let isMuted = false;
document.getElementById('muteBtn').addEventListener('click', ()=>{
  isMuted = !isMuted;
  if(masterGain) masterGain.gain.value = isMuted ? 0 : 0.5;
  document.getElementById('muteBtn').textContent = isMuted ? '🔇 BGM OFF' : '🔊 BGM ON';
});

document.getElementById('backBtn').onclick = fromResult
    ? ()=>showScreen('resultScreen')
    : ()=>showScreen('titleScreen');
  showScreen('rankingScreen');
}
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let dolphinImgLoaded = false;
let dolphinCanvas = null; // 透過処理済みオフスクリーンCanvas

dolphinImg.onload = () => {
  // オフスクリーンCanvasで黒背景を透過に変換
  const oc = document.createElement('canvas');
  oc.width = dolphinImg.width;
  oc.height = dolphinImg.height;
  const octx = oc.getContext('2d');
  octx.drawImage(dolphinImg, 0, 0);
  const imgData = octx.getImageData(0, 0, oc.width, oc.height);
  const d = imgData.data;
  for(let i = 0; i < d.length; i += 4){
    const r = d[i], g = d[i+1], b = d[i+2];
    // 黒に近いピクセルを透過にする（閾値50）
    if(r < 50 && g < 50 && b < 50){
      d[i+3] = 0; // alpha=0（完全透明）
    }
  }
  octx.putImageData(imgData, 0, 0);
  dolphinCanvas = oc;
  dolphinImgLoaded = true;
};
const W = 480, H = 600;

// game vars
let dolphin, rings, obstacles, items, clouds, waves, bubbles;
let lives, score, combo, maxCombo;
let frameCount, diffCfg, stageCfg;
let animId;
let stormFlash = 0;
let jumpPressed = false;

function startGame(){
  initAudio();
  stopBGM();
  diffCfg = DIFF[selectedDiff];
  stageCfg = STAGE_CFG[selectedStage];
  lives = heartCount;
  score = 0; combo = 0; maxCombo = 0;
  frameCount = 0;
  currentScore = 0; bestCombo = 0;
  gameState = 'playing';

  // init dolphin
  dolphin = {
    x: 90, y: H*0.68,
    vy: 0, jumps: 0,
    maxJumps: 2,
    w: 44, h: 28,   // 当たり判定はイルカ本体のみ（描画より小さめ）
    invincible: 0,
    speedBoost: 0,
    emoji: '🐬',
    wobble: 0,
  };

  rings = [];
  obstacles = [];
  items = [];
  clouds = [];
  waves = [];
  bubbles = [];

  // init clouds
  for(let i=0;i<5;i++){
    clouds.push(makeCloud(Math.random()*W));
  }

  // waves
  for(let i=0;i<3;i++){
    waves.push({ x: Math.random()*W, speed: 0.5+Math.random()*0.5, phase: Math.random()*Math.PI*2 });
  }

  updateHUD();
  showScreen('gameScreen');
  document.getElementById('pauseOverlay').classList.remove('show');

  if(animId) cancelAnimationFrame(animId);
  loop();
  setTimeout(startBGM, 100);
}

function makeCloud(x){
  return { x, y: 30+Math.random()*80, w: 60+Math.random()*80, speed: 0.3+Math.random()*0.4, opacity: 0.5+Math.random()*0.4 };
}

function loop(){
  if(gameState==='playing'){
    update();
    draw();
    animId = requestAnimationFrame(loop);
  } else if(gameState==='paused'){
    animId = requestAnimationFrame(loop);
  }
}

const SEA_Y = H * 0.65;

function update(){
  frameCount++;
  const speed = selectedSpeed * 0.8 + 1.2; // スライダー値(1-5)→実速度(2.0-5.2)
  const gravity = 0.45;

  // dolphin physics
  dolphin.vy += gravity;
  dolphin.y += dolphin.vy;
  dolphin.wobble = Math.sin(frameCount*0.1)*3;

  // sea floor
  if(dolphin.y >= SEA_Y - dolphin.h/2){
    dolphin.y = SEA_Y - dolphin.h/2;
    dolphin.vy = 0;
    dolphin.jumps = 0;
  }
  // ceiling
  if(dolphin.y < dolphin.h/2){
    dolphin.y = dolphin.h/2;
    dolphin.vy = 0;
  }

  // timers
  if(dolphin.invincible > 0) dolphin.invincible--;
  if(dolphin.speedBoost > 0) dolphin.speedBoost--;
  if(stormFlash > 0) stormFlash--;

  // spawn rings
  if(Math.random() < 0.012 + frameCount*0.000008){
    const bigRing = Math.random() < 0.5;
    const ringH = bigRing ? 65 : Math.max(diffCfg.minRingH, 35);
    const yPos = SEA_Y - ringH - Math.random()*(SEA_Y*0.55);
    rings.push({
      x: W+40, y: yPos,
      h: ringH, w: ringH*0.6,
      big: bigRing,
      pts: bigRing ? 5 : 15,
      passed: false,
      missed: false,
      pop: 0,
    });
  }

  // spawn obstacles
  if(Math.random() < diffCfg.obstacleFreq){  // speedMul削除済みのため単純比較
    const type = Math.random()<0.5 ? 'rock' : 'jelly';
    obstacles.push({
      x: W+30, y: SEA_Y - 30 - Math.random()*120,
      type, w:36, h:36, hit: false,
    });
  }

  // spawn items
  if(Math.random() < diffCfg.itemFreq){
    const type = Math.random()<0.5 ? 'fish_fast' : 'fish_inv';
    items.push({
      x: W+30, y: SEA_Y - 40 - Math.random()*180,
      type, w:36, h:36, collected:false,
    });
  }

  // update clouds
  clouds.forEach(c=>{ c.x -= 0.4; });
  clouds = clouds.filter(c=>c.x>-150);
  if(clouds.length < 5) clouds.push(makeCloud(W+10));

  // update waves
  waves.forEach(w=>{ w.x -= speed*0.3; if(w.x<-50) w.x=W+50; w.phase+=0.05; });

  // bubbles (stage 2+)
  if(selectedStage>=2 && Math.random()<0.03){
    bubbles.push({ x:Math.random()*W, y:H, r:4+Math.random()*8, vy:1+Math.random(), life:60+Math.random()*60 });
  }
  bubbles.forEach(b=>{ b.y-=b.vy; b.life--; });
  bubbles = bubbles.filter(b=>b.life>0);

  // update rings
  rings.forEach(r=>{
    r.x -= speed;
    if(r.pop>0) r.pop--;
    // リングがイルカを通り過ぎた場合（ハートは減らない・コンボのみリセット）
    if(!r.passed && !r.missed && r.x + r.w < dolphin.x - dolphin.w/2){
      r.missed = true;
      combo = 0;
      updateHUD();
    }
    // イルカがリングの中にいる間に通過チェック
    if(!r.passed && !r.missed){
      const ringTop = r.y;
      const ringBot = r.y + r.h;
      const dTop = dolphin.y - dolphin.h/2;
      const dBot = dolphin.y + dolphin.h/2;
      // イルカがリングの横範囲にいる時
      if(dolphin.x > r.x && dolphin.x < r.x + r.w){
        // 上下も範囲内ならスコア
        if(dTop >= ringTop && dBot <= ringBot){
          r.passed = true;
          r.pop = 20;
          combo++;
          if(combo>maxCombo) maxCombo=combo;
          const pts = r.pts * (1 + Math.floor(combo/3)*0.5);
          score += Math.round(pts);
          currentScore = score;
          bestCombo = maxCombo;
          seRingGet(combo);
          updateHUD();
        }
      }
    }
  });
  rings = rings.filter(r=>r.x>-60);

  // update obstacles
  obstacles.forEach(o=>{
    o.x -= speed;
    if(!o.hit && dolphin.invincible===0){
      if(Math.abs(dolphin.x - o.x) < (dolphin.w/2+o.w/2)*0.75 &&
         Math.abs(dolphin.y - o.y) < (dolphin.h/2+o.h/2)*0.75){
        o.hit = true;
        dolphin.invincible = 90;
        combo = 0;
        seHit();
        loseHeart();
        updateHUD();
      }
    }
  });
  obstacles = obstacles.filter(o=>o.x>-60);

  // update items
  items.forEach(it=>{
    it.x -= speed;
    if(!it.collected){
      if(Math.abs(dolphin.x - it.x) < (dolphin.w/2+it.w/2)*0.8 &&
         Math.abs(dolphin.y - it.y) < (dolphin.h/2+it.h/2)*0.8){
        it.collected = true;
        if(it.type==='fish_fast') dolphin.speedBoost = 180;
        else dolphin.invincible = 180;
        score += 10;
        currentScore = score;
        seItem();
        updateHUD();
      }
    }
  });
  items = items.filter(it=>it.x>-60 && !it.collected);

  // storm lightning
  if(selectedStage===3 && Math.random()<0.003){
    stormFlash = 6;
  }
}

function loseHeart(){
  lives--;
  updateHUD();
  if(lives<=0) endGame();
}

function endGame(){
  gameState='over';
  cancelAnimationFrame(animId);
  stopBGM();
  seGameOver();
  currentScore = score;
  bestCombo = maxCombo;
  showResult();
}

function showResult(){
  document.getElementById('resultScore').textContent = score + ' pt';
  const emoji = score>200?'🎉':score>100?'😊':'😢';
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = score>200?'すごい！！':'ゲームオーバー！';
  document.getElementById('resultCombo').textContent = maxCombo>0 ? `さいこうコンボ: ${maxCombo}🔥` : '';
  document.getElementById('nameInput').value = savedName;
  document.getElementById('registerBtn').textContent = '🏆 とうろく';
  document.getElementById('registerBtn').disabled = false;
  showScreen('resultScreen');
}

// ===== DRAW =====
function draw(){
  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawWaves();
  drawBubbles();
  drawClouds();
  drawRings();
  drawObstacles();
  drawItems();
  drawDolphin();
  if(selectedStage===3 && stormFlash>0){
    ctx.fillStyle = `rgba(255,255,255,${stormFlash/6*0.25})`;
    ctx.fillRect(0,0,W,H);
  }
}

function drawBackground(){
  const sc = stageCfg;
  // sky
  const skyGrad = ctx.createLinearGradient(0,0,0,SEA_Y);
  skyGrad.addColorStop(0, sc.skyTop);
  skyGrad.addColorStop(1, sc.skyBot);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,W,SEA_Y);
  // sea
  const seaGrad = ctx.createLinearGradient(0,SEA_Y,0,H);
  seaGrad.addColorStop(0, sc.seaTop);
  seaGrad.addColorStop(1, sc.seaBot);
  ctx.fillStyle = seaGrad;
  ctx.fillRect(0,SEA_Y,W,H-SEA_Y);
  // sea surface shimmer
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(0,SEA_Y,W,6);
  // storm rain
  if(selectedStage===3){
    ctx.strokeStyle = 'rgba(180,220,255,0.25)';
    ctx.lineWidth = 1;
    for(let i=0;i<30;i++){
      const rx = (i*47 + frameCount*3) % W;
      const ry = (i*83 + frameCount*4) % SEA_Y;
      ctx.beginPath();
      ctx.moveTo(rx, ry);
      ctx.lineTo(rx-4, ry+16);
      ctx.stroke();
    }
  }
}

function drawClouds(){
  clouds.forEach(c=>{
    ctx.save();
    ctx.globalAlpha = c.opacity * (selectedStage===3 ? 0.6 : 1);
    ctx.fillStyle = selectedStage===3 ? '#8090a0' : '#fff';
    // poofy cloud
    const cx=c.x, cy=c.y, cw=c.w;
    ctx.beginPath();
    ctx.arc(cx, cy, cw*0.3, 0, Math.PI*2);
    ctx.arc(cx+cw*0.25, cy-cw*0.12, cw*0.25, 0, Math.PI*2);
    ctx.arc(cx+cw*0.5, cy, cw*0.28, 0, Math.PI*2);
    ctx.arc(cx+cw*0.2, cy+cw*0.1, cw*0.22, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function drawWaves(){
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2.5;
  waves.forEach(w=>{
    ctx.beginPath();
    for(let x=0;x<=W;x+=6){
      const y = SEA_Y + Math.sin((x+w.x)*0.04 + w.phase)*6;
      x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke();
  });
  ctx.restore();
}

function drawBubbles(){
  bubbles.forEach(b=>{
    ctx.save();
    ctx.globalAlpha = Math.min(b.life/30, 0.5);
    ctx.strokeStyle = 'rgba(200,240,255,0.8)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  });
}

function drawRings(){
  rings.forEach(r=>{
    if(r.passed && r.pop<=0) return;
    ctx.save();
    if(r.pop>0){
      ctx.globalAlpha = r.pop/20;
      const sc2 = 1+(1-r.pop/20)*0.5;
      ctx.translate(r.x+r.w/2, r.y+r.h/2);
      ctx.scale(sc2,sc2);
      ctx.translate(-(r.x+r.w/2), -(r.y+r.h/2));
    }
    // ring body
    const grd = ctx.createLinearGradient(r.x, r.y, r.x, r.y+r.h);
    if(r.big){
      grd.addColorStop(0,'#aaf0ff'); grd.addColorStop(1,'#5bc8f5');
    } else {
      grd.addColorStop(0,'#ffd4a8'); grd.addColorStop(1,'#ffb060');
    }
    ctx.strokeStyle = grd;
    ctx.lineWidth = 7;
    ctx.shadowColor = r.big ? '#5bc8f5' : '#ffb060';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.ellipse(r.x+r.w/2, r.y+r.h/2, r.w/2, r.h/2, 0, 0, Math.PI*2);
    ctx.stroke();
    // pts label
    if(!r.passed){
      ctx.shadowBlur=0;
      ctx.fillStyle = r.big ? '#1a8fc1' : '#d06000';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign='center';
      ctx.fillText(r.pts+'pt', r.x+r.w/2, r.y+r.h/2+5);
    }
    ctx.restore();
  });
}

function drawObstacles(){
  obstacles.forEach(o=>{
    ctx.save();
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    if(o.type==='rock'){
      // 岩: はっきりしたグレーの丸石
      const jw = 0;
      ctx.beginPath();
      ctx.ellipse(o.x, o.y, o.w*0.55, o.h*0.45, 0.2, 0, Math.PI*2);
      const rg = ctx.createRadialGradient(o.x-6, o.y-6, 2, o.x, o.y, o.w*0.55);
      rg.addColorStop(0,'#c0c0c0');
      rg.addColorStop(0.5,'#909090');
      rg.addColorStop(1,'#505050');
      ctx.fillStyle = rg;
      ctx.fill();
      ctx.strokeStyle='#404040';
      ctx.lineWidth=2;
      ctx.stroke();
      // ひび
      ctx.strokeStyle='#606060';
      ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(o.x-8,o.y-10);ctx.lineTo(o.x-2,o.y+2);ctx.lineTo(o.x+6,o.y-4);
      ctx.stroke();
      // ラベル
      ctx.fillStyle='#fff';
      ctx.font='bold 11px sans-serif';
      ctx.shadowColor='#000';ctx.shadowBlur=3;
      ctx.fillText('🪨',o.x,o.y);
    } else {
      // クラゲ: 明るいピンク/紫で見やすく
      const jw = Math.sin(frameCount*0.1+o.x)*4;
      const oy = o.y+jw;
      // 傘部分
      ctx.beginPath();
      ctx.ellipse(o.x, oy-4, o.w*0.5, o.h*0.38, 0, Math.PI, Math.PI*2);
      const jg = ctx.createRadialGradient(o.x, oy-10, 2, o.x, oy-4, o.w*0.5);
      jg.addColorStop(0,'#ffaaee');
      jg.addColorStop(0.6,'#ee66cc');
      jg.addColorStop(1,'#cc44aa');
      ctx.fillStyle=jg;
      ctx.fill();
      ctx.strokeStyle='#aa2288';
      ctx.lineWidth=2;
      ctx.stroke();
      // 底のフリル
      ctx.beginPath();
      ctx.ellipse(o.x, oy-4, o.w*0.5, o.h*0.38, 0, 0, Math.PI);
      ctx.strokeStyle='#ff88dd';
      ctx.lineWidth=2.5;
      ctx.stroke();
      // 触手
      ctx.strokeStyle='#ee66cc';
      ctx.lineWidth=1.8;
      for(let t=-3;t<=3;t+=1.5){
        ctx.beginPath();
        ctx.moveTo(o.x+t*5, oy+5);
        ctx.quadraticCurveTo(o.x+t*5+3, oy+14, o.x+t*5-2, oy+20);
        ctx.stroke();
      }
      // 目
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(o.x-5,oy-8,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(o.x+5,oy-8,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#993377';
      ctx.beginPath();ctx.arc(o.x-5,oy-8,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(o.x+5,oy-8,1.5,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });
}

function drawItems(){
  items.forEach(it=>{
    const em = it.type==='fish_fast' ? '🐠' : '⭐';
    ctx.save();
    ctx.font = it.w+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    // bob
    const bob = Math.sin(frameCount*0.08+it.x)*5;
    ctx.fillText(em, it.x, it.y+bob);
    ctx.restore();
  });
}

function drawDolphin(){
  ctx.save();
  const blink = dolphin.invincible>0 && Math.floor(frameCount/5)%2===0;
  if(blink) ctx.globalAlpha=0.4;

  const dw = 90, dh = 60; // 描画サイズ
  const dx = dolphin.x - dw/2;
  const dy = dolphin.y + dolphin.wobble - dh/2;

  ctx.save();
  ctx.translate(dolphin.x, dolphin.y + dolphin.wobble);
  // ジャンプ時に少し傾ける
  const angle = Math.max(-0.35, Math.min(0.35, dolphin.vy*0.035));
  ctx.rotate(angle);

  if(dolphin.speedBoost>0){
    ctx.shadowColor='#ffdd00';
    ctx.shadowBlur=22;
  }
  if(dolphin.invincible>0 && !blink){
    ctx.shadowColor='#ff80ff';
    ctx.shadowBlur=18;
  }

  if(dolphinImgLoaded){
    // 黒背景を除いてイルカだけ描画（globalCompositeOperationで背景色抜き）
    ctx.drawImage(dolphinCanvas, -dw/2, -dh/2, dw, dh);
  } else {
    // 画像ロード前はフォールバック
    ctx.font = '52px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('🐬', 0, 0);
  }
  ctx.restore();

  // スピードブーストの残像
  if(dolphin.speedBoost>0){
    for(let i=1;i<=3;i++){
      ctx.globalAlpha = (blink?0.4:1) * (0.25-i*0.07);
      ctx.save();
      ctx.translate(dolphin.x - i*22, dolphin.y + dolphin.wobble);
      ctx.rotate(angle);
      if(dolphinImgLoaded){
        ctx.drawImage(dolphinCanvas, -(dw*0.85)/2, -(dh*0.85)/2, dw*0.85, dh*0.85);
      }
      ctx.restore();
    }
  }
  ctx.restore();
}

function updateHUD(){
  document.getElementById('hudScore').textContent = score + ' pt';
  document.getElementById('hudHearts').textContent = '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, heartCount-lives));
  document.getElementById('hudStage').textContent = stageCfg.name;
  const comboEl = document.getElementById('hudCombo');
  comboEl.textContent = combo>=2 ? `🔥 ${combo} コンボ！` : '';
}

// ===== INPUT =====
function handleJump(){
  if(gameState!=='playing') return;
  if(dolphin.jumps < dolphin.maxJumps){
    dolphin.vy = -11;
    dolphin.jumps++;
    seJump();
  }
}

canvas.addEventListener('click', handleJump);
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); handleJump(); }, {passive:false});
document.addEventListener('keydown', e=>{ if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); handleJump(); }});

function togglePause(){
  if(gameState==='playing'){
    gameState='paused';
    stopBGM();
    document.getElementById('pauseOverlay').classList.add('show');
  } else if(gameState==='paused'){
    gameState='playing';
    document.getElementById('pauseOverlay').classList.remove('show');
    loop();
    setTimeout(startBGM, 100);
  }
}

// ===== AUDIO SYSTEM (Web Audio API) =====
let audioCtx = null;
let bgmPlaying = false;
let bgmNodes = [];
let masterGain = null;

function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.5;
  masterGain.connect(audioCtx.destination);
}

// --- BGM: ゆるふわ海メロディ ---
function startBGM(){
  if(!audioCtx || bgmPlaying) return;
  bgmPlaying = true;

  // コード進行: C - Am - F - G (ループ)
  const melody = [
    // [周波数(Hz), 開始時間(s), 長さ(s)]
    [523.25,0.0,0.4],[659.25,0.5,0.4],[783.99,1.0,0.4],[659.25,1.5,0.4],
    [523.25,2.0,0.4],[587.33,2.5,0.4],[659.25,3.0,0.4],[587.33,3.5,0.4],
    [493.88,4.0,0.4],[523.25,4.5,0.4],[587.33,5.0,0.4],[659.25,5.5,0.4],
    [698.46,6.0,0.4],[659.25,6.5,0.4],[587.33,7.0,0.4],[523.25,7.5,0.5],
  ];
  const loopLen = 8.2;

  // ベース音（低音でゆったり）
  const bassNotes = [
    [130.81,0.0,1.8],[110.00,2.0,1.8],[87.31,4.0,1.8],[98.00,6.0,2.0],
  ];

  // 波音（ホワイトノイズ的な効果）
  function makeWave(){
    if(!bgmPlaying) return;
    const bufSize = audioCtx.sampleRate * 2;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1)*0.04;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const wg = audioCtx.createGain();
    wg.gain.value = 0.25;
    const wf = audioCtx.createBiquadFilter();
    wf.type = 'lowpass';
    wf.frequency.value = 400;
    src.connect(wf);
    wf.connect(wg);
    wg.connect(masterGain);
    src.start();
    src.onended = makeWave;
    bgmNodes.push(src);
  }
  makeWave();

  function scheduleLoop(startTime){
    if(!bgmPlaying) return;

    // メロディ
    melody.forEach(([freq, t, dur])=>{
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0, startTime+t);
      g.gain.linearRampToValueAtTime(0.18, startTime+t+0.05);
      g.gain.linearRampToValueAtTime(0.12, startTime+t+dur*0.7);
      g.gain.linearRampToValueAtTime(0, startTime+t+dur);
      osc.connect(g); g.connect(masterGain);
      osc.start(startTime+t);
      osc.stop(startTime+t+dur+0.05);
      bgmNodes.push(osc);
    });

    // ベース
    bassNotes.forEach(([freq, t, dur])=>{
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0.12, startTime+t);
      g.gain.linearRampToValueAtTime(0, startTime+t+dur);
      osc.connect(g); g.connect(masterGain);
      osc.start(startTime+t);
      osc.stop(startTime+t+dur+0.05);
      bgmNodes.push(osc);
    });

    // ループ予約
    const nextLoop = startTime + loopLen;
    const delay = (nextLoop - audioCtx.currentTime) * 1000 - 100;
    setTimeout(()=>scheduleLoop(nextLoop), Math.max(0, delay));
  }

  scheduleLoop(audioCtx.currentTime + 0.1);
}

function stopBGM(){
  bgmPlaying = false;
  bgmNodes.forEach(n=>{ try{ n.stop(); }catch(e){} });
  bgmNodes = [];
}

// --- 効果音 ---
function seRingGet(combo){
  if(!audioCtx) return;
  // コンボ数に応じて音程が上がる
  const baseFreq = 523.25 * Math.pow(1.05, Math.min(combo,12));
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
  osc.frequency.linearRampToValueAtTime(baseFreq*1.5, audioCtx.currentTime+0.12);
  g.gain.setValueAtTime(0.35, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.25);
  osc.connect(g); g.connect(masterGain);
  osc.start(); osc.stop(audioCtx.currentTime+0.28);
}

function seHit(){
  if(!audioCtx) return;
  // 低くて短い衝突音
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(180, audioCtx.currentTime);
  osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime+0.18);
  g.gain.setValueAtTime(0.4, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.22);
  osc.connect(g); g.connect(masterGain);
  osc.start(); osc.stop(audioCtx.currentTime+0.25);
}

function seItem(){
  if(!audioCtx) return;
  // きらきらした取得音
  [880, 1108, 1318].forEach((freq, i)=>{
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = audioCtx.currentTime + i*0.07;
    g.gain.setValueAtTime(0.25, t);
    g.gain.linearRampToValueAtTime(0, t+0.2);
    osc.connect(g); g.connect(masterGain);
    osc.start(t); osc.stop(t+0.22);
  });
}

function seGameOver(){
  if(!audioCtx) return;
  // 残念な下降音
  const freqs = [440,370,311,262];
  freqs.forEach((freq,i)=>{
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t = audioCtx.currentTime + i*0.18;
    g.gain.setValueAtTime(0.3, t);
    g.gain.linearRampToValueAtTime(0, t+0.3);
    osc.connect(g); g.connect(masterGain);
    osc.start(t); osc.stop(t+0.35);
  });
}

function seJump(){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(300, audioCtx.currentTime);
  osc.frequency.linearRampToValueAtTime(500, audioCtx.currentTime+0.1);
  g.gain.setValueAtTime(0.18, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.12);
  osc.connect(g); g.connect(masterGain);
  osc.start(); osc.stop(audioCtx.currentTime+0.14);
}
